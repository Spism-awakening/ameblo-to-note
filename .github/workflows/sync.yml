name: Ameblo to Note Sync

on:
  schedule:
    - cron: "*/5 * * * *"  # 5分ごとに実行（アメブロ更新を素早く検知）
  workflow_dispatch:
    inputs:
      draft_mode:
        description: '下書きモード（true=下書き保存、false=公開）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # data/published.json をコミットするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run sync
        env:
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
          AMEBLO_RSS_URL: "https://ameblo.jp/pulinet/rss20.xml"
          DRAFT_MODE: ${{ github.event.inputs.draft_mode || 'true' }}
        run: |
          cd scripts
          python main.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/note_*.png
          if-no-files-found: ignore

      - name: Save published cache
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/published.json 2>/dev/null || echo "published.json not found, skipping"
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします"
          else
            git commit -m "chore: update published articles cache [skip ci]"
            git push
          fi
