name: Ameblo to Note Sync

on:
  schedule:
    - cron: "*/30 * * * *"  # 30分ごとに実行（無料枠内：約1,600分/月）
  workflow_dispatch:
    inputs:
      draft_mode:
        description: '下書きモード（true=下書き保存、false=公開）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # data/published.json をコミットするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 新記事がなければここで終了（Playwright インストールをスキップして高速終了）
      - name: Check for new posts
        id: rss_check
        env:
          AMEBLO_RSS_URL: "https://ameblo.jp/pulinet/rss20.xml"
        run: |
          pip install feedparser --quiet
          cd scripts
          RESULT=$(python3 -c "
          from rss_monitor import fetch_new_entries
          entries = fetch_new_entries()
          print('true' if entries else 'false')
          ")
          echo "has_new=$RESULT" >> $GITHUB_OUTPUT
          echo "新記事チェック結果: $RESULT"

      # 新記事があるときだけ Playwright をインストール（時間・コストを節約）
      - name: Install dependencies
        if: steps.rss_check.outputs.has_new == 'true'
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run sync
        if: steps.rss_check.outputs.has_new == 'true'
        env:
          NOTE_COOKIES: ${{ secrets.NOTE_COOKIES }}
          AMEBLO_RSS_URL: "https://ameblo.jp/pulinet/rss20.xml"
          DRAFT_MODE: ${{ github.event.inputs.draft_mode || 'true' }}
        run: |
          cd scripts
          python main.py

      - name: Upload debug screenshots
        if: steps.rss_check.outputs.has_new == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/note_*.png
          if-no-files-found: ignore

      - name: Save published cache
        if: steps.rss_check.outputs.has_new == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/published.json 2>/dev/null || echo "published.json not found, skipping"
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします"
          else
            git commit -m "chore: update published articles cache [skip ci]"
            git push
          fi
